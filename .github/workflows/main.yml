name: Build ESP8266 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Arduino CLI (pinned stable version)
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2
      with:
        version: 0.33.0

    # 3️⃣ Update index and install ESP8266 core
    - name: Install ESP8266 core
      run: |
        arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
        arduino-cli core install "esp8266:esp8266"

    # 4️⃣ Compile the sketch
    - name: Compile firmware
      run: |
        arduino-cli compile \
        --fqbn esp8266:esp8266:nodemcuv2:FlashSize=4M \
        --output-dir build RangeExtender.ino

    # 5️⃣ Upload compiled binary as artifact
    - name: Upload BIN artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp8266-firmware
        path: build/*.bin
